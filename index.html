<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor CAP - Consejo Agrario Provincial</title>
    <!-- Estilos principales: Leaflet, Font Awesome e interfaz personalizada -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- Header institucional fijo con logo y título del visor -->
    <div id="header" class="header">
        <div class="header-content">
            <img src="https://cap.santacruz.gob.ar/img/logo-dark.png" alt="Logo CAP" class="header-logo">
            <h1 class="header-title">Visor CAP</h1>
        </div>
    </div>

    <!-- Contenedor principal del mapa Leaflet -->
    <div id="map"></div>

    <!-- Panel de coordenadas dinámicas que se actualiza con el movimiento del ratón -->
    <div id="ign-coordenadas" class="ign-coordenadas-panel">00° 00' 00.00" S , 00° 00' 00.00" O</div>

    <!-- Herramientas flotantes: utilidades y dibujo -->
    <div class="right-tools-container">
        <div class="top-utility-row">
            <div class="tool-btn" id="btn-toggle-utility" title="Herramientas Generales"><i class="fa-solid fa-wrench"></i></div>
            <div class="tool-btn" id="btn-toggle-dibujo" title="Herramientas de Dibujo"><i class="fa-solid fa-pen"></i></div>
            <div class="horizontal-utility-bar" id="utility-panel">
                <div class="tool-btn util-sub-btn" id="btn-medicion" title="Medir Distancia"><i class="fa-solid fa-ruler"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-ubicacion" title="Ubicar Centro"><i class="fa-solid fa-crosshairs"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-malla" title="Mostrar Malla"><i class="fa-solid fa-border-all"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-fullscreen" title="Pantalla Completa"><i class="fa-solid fa-expand"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-captura" title="Capturar Vista"><i class="fa-solid fa-camera"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-imprimir" title="Imprimir Mapa"><i class="fa-solid fa-print"></i></div>
                <div class="tool-btn util-sub-btn" id="btn-consulta" title="Identificar Objeto"><i class="fa-solid fa-arrow-pointer"></i></div>
            </div>
        </div>
        <div class="side-drawing-bar" id="drawing-panel">
            <div class="tool-btn draw-sub-btn" id="draw-text" title="Texto"><i class="fa-solid fa-font"></i></div>
            <div class="tool-btn draw-sub-btn" id="draw-line" title="Línea"><i class="fa-solid fa-route"></i></div>
            <div class="tool-btn draw-sub-btn" id="draw-polygon" title="Polígono"><i class="fa-solid fa-draw-polygon"></i></div>
            <div class="tool-btn draw-sub-btn" id="draw-rectangle" title="Rectángulo"><i class="fa-solid fa-square"></i></div>
            <div class="tool-btn draw-sub-btn" id="draw-circle" title="Círculo"><i class="fa-solid fa-circle"></i></div>
            <div class="tool-btn draw-sub-btn" id="draw-marker" title="Punto"><i class="fa-solid fa-location-dot"></i></div>
            <div class="tool-btn draw-sub-btn" id="btn-clear-all" title="Limpiar dibujos"><i class="fa-solid fa-trash-can"></i></div>
        </div>
    </div>

    <div class="custom-zoom-panel" id="custom-zoom-panel">
        <button type="button" class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
        <button type="button" class="zoom-btn" id="zoom-home" title="Vista inicial"><i class="fa-solid fa-house"></i></button>
        <button type="button" class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
    </div>

    <!-- Panel lateral de capas con búsqueda, acciones y listado dinámico -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div>
                <h2>Capas</h2>
                <p>Selecciona y activa capas del visor</p>
            </div>
            <button id="close-sidebar">×</button>
        </div>
        <div class="sidebar-tools">
            <div class="tool-row">
                <div class="search-box">
                    <input id="layer-search" type="search" placeholder="Buscar capa" aria-label="Buscar capa">
                </div>
                <div class="actions-row">
                    <button id="base-map-btn" type="button" class="action-icon" title="Mapas base">🗺</button>
                    <button id="add-layer-btn" type="button" class="action-icon" title="Agregar capa">+</button>
                </div>
            </div>
            <div id="add-layer-menu" class="add-layer-menu">
                <button id="add-file-btn" type="button" class="add-layer-option">Agregar archivos</button>
                <button id="show-wms-panel-btn" type="button" class="add-layer-option">Agregar WMS</button>
                <div id="wms-panel" class="wms-panel hidden">
                    <input id="wms-url-input" type="url" placeholder="URL del servicio WMS" aria-label="URL WMS">
                    <div class="wms-controls">
                        <button id="load-wms-layers-btn" type="button" class="add-layer-connect">Listar capas</button>
                        <button id="refresh-wms-btn" type="button" class="add-layer-connect">Limpiar</button>
                    </div>
                    <div id="wms-layer-list" class="wms-layer-list"></div>
                </div>
            </div>
            <div id="base-map-selector" class="base-map-selector"></div>
            <input id="file-input" type="file" accept=".kml,.geojson,.gpx,.zip,.txt,.wkt,.json" hidden>
        </div>
        <div id="layer-list" class="layer-list"></div>
    </div>

    <div id="attribute-table-modal" class="attribute-table-modal">
        <div class="attribute-table-content">
            <div class="attribute-table-header">
                <div>
                    <h3 id="attribute-table-title">Tabla de atributos</h3>
                    <p id="attribute-table-summary" class="attribute-table-summary"></p>
                </div>
                <div class="attribute-table-header-actions">
                    <button id="attribute-table-rename" type="button" class="attribute-table-rename-field">Renombrar</button>
                    <button id="attribute-table-add-field" type="button" class="attribute-table-add-field">Agregar campo</button>
                    <button id="attribute-table-close" type="button" class="attribute-table-close" title="Cerrar">×</button>
                </div>
            </div>
            <div id="attribute-table-container" class="attribute-table-container"></div>
            <div class="attribute-table-actions">
                <button id="attribute-table-save" type="button" class="attribute-table-save">Guardar cambios</button>
                <button id="attribute-table-cancel" type="button" class="attribute-table-cancel">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Botón flotante para abrir/cerrar el panel de capas -->
    <button id="menu-toggle" class="floating-btn" title="Mostrar capas">
        <img src="assets/layer-group.svg" alt="Capas">
    </button>

    <!-- Librerías JS externas necesarias: Leaflet y soportes de formatos geoespaciales -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/dist/togeojson.min.js"></script>
    <script src="https://unpkg.com/wellknown@0.5.0/wellknown.min.js"></script>
    <script src="https://unpkg.com/shpjs@3.4.0/dist/shp.min.js"></script>
    <!-- Definición de capas WFS y servicios de datos geoespaciales -->
    <script src="js/layers.js"></script>
    <!-- Lógica principal del mapa y controles de dibujo -->
    <script src="js/map.js"></script>
    <!-- Interacción del panel de capas y UI adicional -->
    <script src="js/ui.js"></script>
</body>
</html>
