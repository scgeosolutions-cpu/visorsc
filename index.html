<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor CAP - Consejo Agrario Provincial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div id="header" class="header">
        <div class="header-content">
            <img src="https://cap.santacruz.gob.ar/img/logo-dark.png" alt="Logo CAP" class="header-logo">
            <h1 class="header-title">Visor CAP</h1>
        </div>
    </div>

    <div id="map"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Capas</h2>
            <button id="close-sidebar">×</button>
        </div>
        <div id="layer-list" class="layer-list">
            </div>
    </div>

    <button id="menu-toggle" class="floating-btn" title="Mostrar capas">
        <img src="https://img.icons8.com/material-rounded/24/1e3a8a/layer-group.png" alt="Capas">
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/layers.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
